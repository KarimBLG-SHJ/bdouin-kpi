<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BDouin — Dashboard Email</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115; --card: #181b22; --border: #2a2e38;
    --text: #e8eaed; --muted: #9aa0a6;
    --accent: #4ade80; --warn: #fbbf24; --danger: #ef4444;
    --link: #60a5fa; --email: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font: 14px -apple-system, BlinkMacSystemFont, Inter, sans-serif;
         background: var(--bg); color: var(--text); padding: 20px; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .grid { display: grid; gap: 16px; margin-bottom: 24px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  .card { background: var(--card); border: 1px solid var(--border);
          border-radius: 12px; padding: 16px; }
  .kpi { font-size: 11px; color: var(--muted); text-transform: uppercase;
         letter-spacing: 0.5px; margin-bottom: 8px; }
  .val { font-size: 28px; font-weight: 600; line-height: 1.1; }
  .sub-val { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .accent { color: var(--accent); }
  .warn { color: var(--warn); }
  .danger { color: var(--danger); }
  .email-color { color: var(--email); }
  .section-title { font-size: 16px; font-weight: 600; margin: 24px 0 12px;
                   display: flex; align-items: center; gap: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500;
       padding: 8px 6px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  th:hover { color: var(--text); }
  td { padding: 8px 6px; border-bottom: 1px solid var(--border); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .truncate { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-bg { background: #1e2530; border-radius: 4px; height: 6px; min-width: 60px; }
  .bar-fill { background: var(--email); border-radius: 4px; height: 6px; }
  canvas { max-height: 280px; }
  .nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .nav a { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
           color: var(--muted); text-decoration: none; font-size: 13px; }
  .nav a:hover { border-color: var(--email); color: var(--text); }
  .nav a.active { background: var(--email); color: #0f1115; border-color: var(--email); font-weight: 600; }
  @media (max-width: 1100px) { .grid-4, .grid-3 { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 600px)  { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="nav">
  <a href="/exec">📊 Exécutif</a>
  <a href="/email" class="active">📧 Email</a>
  <a href="/instagram">📸 Instagram</a>
</div>

<h1>BDouin — Dashboard Email</h1>
<div class="sub">MailerLite · 133 campagnes · 324K abonnés</div>

<!-- KPIs -->
<div class="grid grid-4" id="kpis-row"></div>

<!-- Timeline -->
<div class="section-title">📈 Campagnes mensuelles — Taux d'ouverture</div>
<div class="card">
  <canvas id="monthly-chart"></canvas>
</div>

<!-- Top campaigns + Groups -->
<div class="grid grid-2" style="margin-top:24px;">
  <div class="card">
    <div class="section-title" style="margin-top:0;">🏆 Top 20 campagnes (taux d'ouverture)</div>
    <div style="max-height:520px; overflow-y:auto;">
      <table id="top-campaigns-table"></table>
    </div>
  </div>
  <div class="card">
    <div class="section-title" style="margin-top:0;">👥 Groupes d'abonnés (39)</div>
    <div style="max-height:520px; overflow-y:auto;">
      <table id="groups-table"></table>
    </div>
  </div>
</div>

<!-- All campaigns -->
<div class="section-title">📋 Toutes les campagnes (133)</div>
<div class="card">
  <div style="max-height:600px; overflow-y:auto;">
    <table id="all-campaigns-table"></table>
  </div>
</div>

<script>
const fmt = n => n == null ? '—' : new Intl.NumberFormat('fr-FR').format(Math.round(n));
const pct = n => n == null ? '—' : `${Number(n).toFixed(1)}%`;
const fmtDate = d => d ? new Date(d).toLocaleDateString('fr-FR', {day:'2-digit',month:'short',year:'2-digit'}) : '—';

async function fetchJSON(url) {
  const r = await fetch(url);
  return r.json();
}

function kpiCard(label, value, sub, cls='') {
  return `<div class="card">
    <div class="kpi">${label}</div>
    <div class="val ${cls}">${value}</div>
    ${sub ? `<div class="sub-val">${sub}</div>` : ''}
  </div>`;
}

function rateBar(val, max=100) {
  const w = Math.min(100, (val/max)*100).toFixed(1);
  return `<div class="bar-bg"><div class="bar-fill" style="width:${w}%"></div></div>`;
}

async function loadKPIs() {
  const d = await fetchJSON('/api/email/kpis');
  const s = d.subscribers || {};
  const c = d.campaigns || {};
  document.getElementById('kpis-row').innerHTML = [
    kpiCard('📧 Abonnés totaux',    fmt(s.total),        `${fmt(s.active)} actifs · ${fmt(s.unsubscribed)} désabos`, 'email-color'),
    kpiCard('✉️ Campagnes envoyées', fmt(c.total_sent),   `Dernière : ${fmtDate(c.last_send)}`),
    kpiCard('👁 Taux d\'ouverture moy.', pct(c.avg_open_rate), `Industrie: ~25% — BDouin : exceptionnel`, 'accent'),
    kpiCard('🖱 CTR moyen',         pct(c.avg_ctr),      `${fmt(c.total_unsubscribed)} désabos cumulés`),
  ].join('');
}

async function loadMonthly() {
  const rows = await fetchJSON('/api/email/monthly');
  const labels = rows.map(r => r.month?.slice(0,7) || '');
  const campaigns = rows.map(r => r.campaigns);
  const openRates = rows.map(r => r.avg_open_rate ? Number(r.avg_open_rate).toFixed(1) : null);

  const ctx = document.getElementById('monthly-chart').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Campagnes',
          data: campaigns,
          backgroundColor: 'rgba(167,139,250,0.3)',
          borderColor: 'rgba(167,139,250,0.8)',
          borderWidth: 1,
          yAxisID: 'y',
          order: 2,
        },
        {
          label: 'Taux d\'ouverture (%)',
          data: openRates,
          type: 'line',
          borderColor: '#4ade80',
          backgroundColor: 'rgba(74,222,128,0.1)',
          borderWidth: 2,
          pointRadius: 3,
          tension: 0.3,
          yAxisID: 'y2',
          order: 1,
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#9aa0a6' } } },
      scales: {
        x: { ticks: { color: '#9aa0a6', maxTicksLimit: 18 }, grid: { color: '#1e2530' } },
        y: {
          position: 'left',
          ticks: { color: '#9aa0a6' },
          grid: { color: '#1e2530' },
          title: { display: true, text: 'Nb campagnes', color: '#9aa0a6' }
        },
        y2: {
          position: 'right',
          min: 0, max: 100,
          ticks: { color: '#4ade80', callback: v => v + '%' },
          grid: { drawOnChartArea: false },
          title: { display: true, text: 'Taux d\'ouverture', color: '#4ade80' }
        }
      }
    }
  });
}

async function loadTopCampaigns() {
  const rows = await fetchJSON('/api/email/top-campaigns');
  const maxRate = rows.reduce((m, r) => Math.max(m, r.opened_rate || 0), 0);
  const thead = `<tr>
    <th>Sujet</th>
    <th>Date</th>
    <th>Dest.</th>
    <th>Ouv.</th>
    <th>CTR</th>
  </tr>`;
  const tbody = rows.map(r => `<tr>
    <td class="truncate" title="${r.subject || r.name || ''}">${r.subject || r.name || '—'}</td>
    <td style="white-space:nowrap">${fmtDate(r.date_send)}</td>
    <td class="num">${fmt(r.total_recipients)}</td>
    <td>
      <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end">
        <span style="color:var(--accent);font-weight:600">${pct(r.opened_rate)}</span>
        ${rateBar(r.opened_rate, maxRate)}
      </div>
    </td>
    <td class="num">${pct(r.clicked_rate)}</td>
  </tr>`).join('');
  document.getElementById('top-campaigns-table').innerHTML = thead + tbody;
}

async function loadGroups() {
  const rows = await fetchJSON('/api/email/groups');
  const maxTotal = rows.reduce((m, r) => Math.max(m, r.total || 0), 0);
  const thead = `<tr>
    <th>Groupe</th>
    <th>Total</th>
    <th>Actifs</th>
    <th>Taux ouv.</th>
  </tr>`;
  const tbody = rows.map(r => `<tr>
    <td class="truncate" title="${r.name}">${r.name}</td>
    <td>
      <div style="display:flex;align-items:center;gap:6px">
        <span>${fmt(r.total)}</span>
        ${rateBar(r.total, maxTotal)}
      </div>
    </td>
    <td class="num">${fmt(r.active)}</td>
    <td class="num">${r.open_rate != null ? `<span style="color:var(--accent)">${r.open_rate}%</span>` : '—'}</td>
  </tr>`).join('');
  document.getElementById('groups-table').innerHTML = thead + tbody;
}

async function loadAllCampaigns() {
  const rows = await fetchJSON('/api/email/campaigns');
  const thead = `<tr>
    <th>Date</th>
    <th>Sujet</th>
    <th>Dest.</th>
    <th>Ouvertures</th>
    <th>Taux ouv.</th>
    <th>Clics</th>
    <th>CTR</th>
    <th>Désabos</th>
    <th>Bounces</th>
  </tr>`;
  const tbody = rows.map(r => {
    const or = r.opened_rate || 0;
    const orCls = or >= 50 ? 'accent' : or >= 30 ? '' : 'warn';
    return `<tr>
      <td style="white-space:nowrap">${fmtDate(r.date_send)}</td>
      <td class="truncate" title="${r.subject || ''}">${r.subject || r.name || '—'}</td>
      <td class="num">${fmt(r.total_recipients)}</td>
      <td class="num">${fmt(r.opened_count)}</td>
      <td class="num"><span class="${orCls}">${pct(r.opened_rate)}</span></td>
      <td class="num">${fmt(r.clicked_count)}</td>
      <td class="num">${pct(r.clicked_rate)}</td>
      <td class="num">${fmt(r.unsubscribed)}</td>
      <td class="num">${fmt(r.bounced)}</td>
    </tr>`;
  }).join('');
  document.getElementById('all-campaigns-table').innerHTML = thead + tbody;
}

Promise.all([loadKPIs(), loadMonthly(), loadTopCampaigns(), loadGroups(), loadAllCampaigns()]);
</script>
</body>
</html>
