<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BDouin — Apps Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115; --card: #181b22; --border: #2a2e38;
    --text: #e8eaed; --muted: #9aa0a6;
    --accent: #4ade80; --warn: #fbbf24; --danger: #ef4444;
    --ios: #60a5fa; --android: #4ade80; --apps: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font: 14px -apple-system, BlinkMacSystemFont, Inter, sans-serif;
         background: var(--bg); color: var(--text); padding: 20px; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .grid { display: grid; gap: 16px; margin-bottom: 24px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .kpi { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .val { font-size: 28px; font-weight: 600; line-height: 1.1; }
  .sub-val { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .accent { color: var(--accent); }
  .ios-color { color: var(--ios); }
  .android-color { color: var(--android); }
  .apps-color { color: var(--apps); }
  .section-title { font-size: 16px; font-weight: 600; margin: 24px 0 12px;
                   display: flex; align-items: center; gap: 8px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab-btn { padding: 8px 18px; border: none; background: none; color: var(--muted);
             font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent;
             margin-bottom: -1px; font-family: inherit; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--apps); border-bottom-color: var(--apps); font-weight: 600; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500;
       padding: 8px 6px; border-bottom: 1px solid var(--border); }
  td { padding: 8px 6px; border-bottom: 1px solid var(--border); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .bar-bg { background: #1e2530; border-radius: 4px; height: 6px; flex: 1; min-width: 60px; }
  .bar-fill { border-radius: 4px; height: 6px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-ios     { background: rgba(96,165,250,0.15); color: var(--ios); }
  .badge-android { background: rgba(74,222,128,0.15); color: var(--android); }
  canvas { max-height: 260px; }
  .quality-ok   { color: var(--accent); }
  .quality-warn { color: var(--warn); }
  .quality-bad  { color: var(--danger); }
  .nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .nav a { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
           color: var(--muted); text-decoration: none; font-size: 13px; }
  .nav a:hover { border-color: var(--apps); color: var(--text); }
  .nav a.active { background: var(--apps); color: #0f1115; border-color: var(--apps); font-weight: 600; }
  @media (max-width: 1100px) { .grid-4, .grid-3 { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 600px)  { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="nav">
  <a href="/exec">📊 Exécutif</a>
  <a href="/email">📧 Email</a>
  <a href="/instagram">📸 Instagram</a>
  <a href="/sociology">🧬 Sociologie</a>
  <a href="/apps" class="active">📱 Apps</a>
</div>

<h1>BDouin — Apps Mobile</h1>
<div class="sub">iOS App Store · Google Play · 4 applications</div>

<!-- KPIs -->
<div class="grid grid-4" id="kpis-row"></div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('ios', this)">🍎 iOS</button>
  <button class="tab-btn" onclick="switchTab('android', this)">🤖 Android</button>
</div>

<!-- TAB iOS -->
<div id="tab-ios" class="tab-panel active">

  <div class="grid grid-2">
    <div class="card">
      <div class="section-title" style="margin-top:0;">📥 Téléchargements iOS mensuels</div>
      <canvas id="ios-monthly-chart"></canvas>
    </div>
    <div class="card">
      <div class="section-title" style="margin-top:0;">🌍 Top pays iOS</div>
      <table id="ios-countries-table"></table>
    </div>
  </div>

  <div class="section-title">📊 Détail mensuel iOS</div>
  <div class="card">
    <table id="ios-detail-table"></table>
  </div>

</div>

<!-- TAB Android -->
<div id="tab-android" class="tab-panel">

  <div class="grid grid-2">
    <div class="card">
      <div class="section-title" style="margin-top:0;">👥 Utilisateurs actifs Android (mensuels)</div>
      <canvas id="android-monthly-chart"></canvas>
    </div>
    <div class="card">
      <div class="section-title" style="margin-top:0;">🔧 Qualité apps (90 derniers jours)</div>
      <div id="android-quality-display"></div>
    </div>
  </div>

</div>

<script>
const fmt  = n => n == null ? '—' : new Intl.NumberFormat('fr-FR').format(Math.round(n));
const fmtK = n => { if (!n) return '—'; if (n>=1000000) return (n/1000000).toFixed(1)+'M'; if (n>=1000) return (n/1000).toFixed(1)+'K'; return String(Math.round(n)); };
const fmtDate = d => d ? d.slice(0,7) : '—';
const flags = { FR:'🇫🇷',BE:'🇧🇪',CA:'🇨🇦',CH:'🇨🇭',SN:'🇸🇳',CI:'🇨🇮',ML:'🇲🇱',US:'🇺🇸',AE:'🇦🇪',CM:'🇨🇲',DZ:'🇩🇿',MA:'🇲🇦',TN:'🇹🇳',GB:'🇬🇧',DE:'🇩🇪' };

async function fetchJSON(url) { const r = await fetch(url); return r.json(); }

function kpiCard(label, value, sub, cls='') {
  return `<div class="card"><div class="kpi">${label}</div><div class="val ${cls}">${value}</div>${sub?`<div class="sub-val">${sub}</div>`:''}</div>`;
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

async function loadKPIs() {
  const d = await fetchJSON('/api/apps/kpis');
  const ios = d.ios || {};
  const and = d.android || {};
  const totalAndroid = (and.school_active||0) + (and.salat_active||0) + (and.strips_active||0) + (and.quiz_active||0);
  document.getElementById('kpis-row').innerHTML = [
    kpiCard('📥 DL iOS total', fmt(ios.total_downloads), `${fmt(ios.total_updates)} mises à jour · ${fmtDate(ios.first_date)} → ${fmtDate(ios.last_date)}`, 'ios-color'),
    kpiCard('🍎 Awlad School iOS', fmt(ios.awlad_school_dl), 'App principale'),
    kpiCard('👥 Actifs Android 2026', fmtK(totalAndroid), 'Somme 4 apps · distinctUsers', 'android-color'),
    kpiCard('🤖 Awlad School Android', fmtK(and.school_active), 'Première app du catalogue'),
  ].join('');
}

async function loadIOS() {
  const rows = await fetchJSON('/api/apps/ios-monthly');

  // Group by month
  const months = [...new Set(rows.map(r => r.month))].sort();
  const apps   = [...new Set(rows.map(r => r.app_name))];
  const colors = { 'Awlad School': '#60a5fa', 'Awlad Quiz GO': '#fb923c' };
  const byApp  = {};
  apps.forEach(a => byApp[a] = {});
  rows.forEach(r => { byApp[r.app_name][r.month] = r.downloads; });

  const ctx = document.getElementById('ios-monthly-chart').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months.map(fmtDate),
      datasets: apps.map(a => ({
        label: a,
        data: months.map(m => byApp[a][m] || 0),
        backgroundColor: (colors[a] || '#9aa0a6') + '80',
        borderColor: colors[a] || '#9aa0a6',
        borderWidth: 1,
        stack: 'ios',
      }))
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#9aa0a6' } } },
      scales: {
        x: { ticks: { color: '#9aa0a6' }, grid: { color: '#1e2530' }, stacked: true },
        y: { ticks: { color: '#9aa0a6' }, grid: { color: '#1e2530' }, stacked: true }
      }
    }
  });

  // Detail table
  const thead = `<tr><th>Mois</th><th>App</th><th>Téléchargements</th><th>Mises à jour</th></tr>`;
  const tbody = [...rows].reverse().map(r => `<tr>
    <td>${fmtDate(r.month)}</td>
    <td><span class="badge badge-ios">${r.app_name}</span></td>
    <td class="num" style="color:var(--ios);font-weight:600">${fmt(r.downloads)}</td>
    <td class="num">${fmt(r.updates)}</td>
  </tr>`).join('');
  document.getElementById('ios-detail-table').innerHTML = thead + tbody;
}

async function loadIOSCountries() {
  const rows = await fetchJSON('/api/apps/ios-countries');
  const max = rows[0]?.downloads || 1;
  const thead = `<tr><th>Pays</th><th>Téléchargements</th><th>MAJ</th></tr>`;
  const tbody = rows.map(r => {
    const w = ((r.downloads / max) * 100).toFixed(1);
    return `<tr>
      <td>${flags[r.country]||''} ${r.country}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="bar-bg"><div class="bar-fill" style="width:${w}%;background:var(--ios)"></div></div>
          <span style="color:var(--ios);font-weight:600">${fmt(r.downloads)}</span>
        </div>
      </td>
      <td class="num">${fmt(r.updates)}</td>
    </tr>`;
  }).join('');
  document.getElementById('ios-countries-table').innerHTML = thead + tbody;
}

async function loadAndroid() {
  const rows = await fetchJSON('/api/apps/android-monthly');
  const months = [...new Set(rows.map(r => r.month))].sort();
  const apps   = [...new Set(rows.map(r => r.app_name))];
  const colors = {
    'Awlad School':  '#4ade80',
    'Awlad Salat':   '#60a5fa',
    'Muslim Strips': '#f472b6',
    'Awlad Quiz':    '#fb923c',
  };
  const byApp = {};
  apps.forEach(a => byApp[a] = {});
  rows.forEach(r => { byApp[r.app_name][r.month] = Number(r.active_users); });

  const ctx = document.getElementById('android-monthly-chart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: months.map(fmtDate),
      datasets: apps.map(a => ({
        label: a,
        data: months.map(m => byApp[a][m] || null),
        borderColor: colors[a] || '#9aa0a6',
        backgroundColor: (colors[a] || '#9aa0a6') + '20',
        borderWidth: 2,
        pointRadius: 2,
        tension: 0.3,
        spanGaps: true,
      }))
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#9aa0a6' } } },
      scales: {
        x: { ticks: { color: '#9aa0a6', maxTicksLimit: 14 }, grid: { color: '#1e2530' } },
        y: { ticks: { color: '#9aa0a6', callback: v => fmtK(v) }, grid: { color: '#1e2530' } }
      }
    }
  });
}

async function loadAndroidQuality() {
  const rows = await fetchJSON('/api/apps/android-quality');
  const html = rows.map(r => {
    const crash = r.crash_rate ? (r.crash_rate * 100).toFixed(2) : null;
    const anr   = r.anr_rate   ? (r.anr_rate   * 100).toFixed(2) : null;
    const crashCls = !crash ? '' : crash > 0.5 ? 'quality-bad' : crash > 0.2 ? 'quality-warn' : 'quality-ok';
    const anrCls   = !anr   ? '' : anr   > 0.5 ? 'quality-bad' : anr   > 0.2 ? 'quality-warn' : 'quality-ok';
    return `<div style="padding:12px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-weight:600">${r.app_name}</span>
        <span style="color:var(--muted);font-size:12px">${fmtK(r.avg_active_users)} users actifs/mois</span>
      </div>
      <div style="display:flex;gap:16px;font-size:13px">
        <span>💥 Crash rate : <span class="${crashCls}">${crash ? crash+'%' : '—'}</span></span>
        <span>🔴 ANR rate : <span class="${anrCls}">${anr ? anr+'%' : '—'}</span></span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('android-quality-display').innerHTML = html;
}

Promise.all([loadKPIs(), loadIOS(), loadIOSCountries(), loadAndroid(), loadAndroidQuality()]);
</script>
</body>
</html>
